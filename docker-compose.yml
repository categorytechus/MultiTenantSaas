services:
  # Infrastructure Services
  postgres:
    image: postgres:15-alpine
    container_name: multitenant-postgres
    environment:
      POSTGRES_DB: multitenant_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: multitenant-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 300s

  # Application Services (Stub builds for Day 1)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multitenant-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_AUTH_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_CHAT_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:3002
    depends_on:
      auth-gateway:
        condition: service_started
      task-status:
        condition: service_started
    command: node server.js

  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: multitenant-auth
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - JWT_KEY=${JWT_KEY:-dev-secret-key}
      - GOOGLE_CLIENT_ID=mock
      - GOOGLE_CLIENT_SECRET=mock
    depends_on:
      postgres:
        condition: service_healthy

  auth-gateway:
    build:
      context: ./auth-gateway
      dockerfile: Dockerfile
    container_name: multitenant-auth-gateway
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - JWT_KEY=${JWT_KEY:-dev-secret-key}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: multitenant-chat
    ports:
      - "8004:3002"   # REST/FastAPI Health
      - "50052:50052" # gRPC
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - RAG_SERVICE_ADDR=rag-service:50051
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rag-service:
        condition: service_started

  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    container_name: multitenant-orchestrator
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
      - CHAT_SERVICE_ADDR=chat-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chat-service:
        condition: service_started

  worker-agent1:
    build:
      context: .
      dockerfile: agents/worker_agent1/Dockerfile
    container_name: multitenant-worker-1
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
      - CHAT_SERVICE_ADDR=chat-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  rag-service:
    build:
      context: .
      dockerfile: rag/Dockerfile
    container_name: multitenant-rag
    ports:
      - "8003:8000"   # REST/FastAPI Health check
      - "50051:50051" # gRPC
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - S3_VECTOR_BUCKET=${S3_VECTOR_BUCKET:-dev-local-bucket}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy

  task-status:
    build:
      context: ./task-status
      dockerfile: Dockerfile
    container_name: multitenant-task-status
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - JWT_KEY=${JWT_KEY:-dev-secret-key}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  default:
    name: multitenant-network
