version: '3.8'

services:
  # Infrastructure Services
  postgres:
    image: postgres:15-alpine
    container_name: multitenant-postgres
    environment:
      POSTGRES_DB: multitenant_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: multitenant-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Services (Stub builds for Day 1)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../frontend.Dockerfile
    container_name: multitenant-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - auth-service
    # Commented out until actual code is added
    # command: npm run dev

  auth-service:
    build:
      context: ./auth
      dockerfile: ../auth-service.Dockerfile
    container_name: multitenant-auth
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/multitenant_saas
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
    depends_on:
      postgres:
        condition: service_healthy

  auth-gateway:
    build:
      context: ./auth-gateway
      dockerfile: Dockerfile
    container_name: multitenant-auth-gateway
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - JWT_KEY=${JWT_SECRET:-dev-secret-key}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/multitenant_saas
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: multitenant-chat
    ports:
      - "8004:3002"   # REST/FastAPI Health
      - "50052:50052" # gRPC
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/multitenant_saas
      - RAG_SERVICE_ADDR=rag-service:50051
    depends_on:
      postgres:
        condition: service_healthy
      rag-service:
        condition: service_started

  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    container_name: multitenant-orchestrator
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/multitenant_saas
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
      - CHAT_SERVICE_ADDR=chat-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chat-service:
        condition: service_started

  worker-agent1:
    build:
      context: .
      dockerfile: agents/worker_agent1/Dockerfile
    container_name: multitenant-worker-1
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/multitenant_saas
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
      - CHAT_SERVICE_ADDR=chat-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  rag-service:
    build:
      context: .
      dockerfile: rag/Dockerfile
    container_name: multitenant-rag
    ports:
      - "8003:8000"   # REST/FastAPI Health check
      - "50051:50051" # gRPC
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - S3_VECTOR_BUCKET=${S3_VECTOR_BUCKET:-dev-local-bucket}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    depends_on:
      - postgres

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  default:
    name: multitenant-network
