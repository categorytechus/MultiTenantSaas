syntax = "proto3";

package rbac_rag;

// gRPC interface for raw document retrieval
service RagService {
  rpc RetrieveDocuments (RetrievalRequest) returns (RetrievalResponse);
}

// gRPC interface for generative chat (Knowledge Expert)
service ChatService {
  rpc GenerateAnswer (ChatRequest) returns (ChatResponse);
}

message Message {
  string role = 1;
  string content = 2;
}

message Document {
  string page_content = 1;
  map<string, string> metadata = 2;
  float score = 3;
}

message RetrievalRequest {
  string query = 1;
  string user_id = 2;
  repeated string allowed_asset_ids = 3;
  repeated Message context = 4;
}

message RetrievalResponse {
  repeated Document chunks = 1;
}

message ChatRequest {
  string query = 1;
  string user_id = 2;
  repeated string allowed_asset_ids = 3;
  repeated Message context = 4;
}

message ChatResponse {
  string answer = 1;
  repeated Document chunks = 2;
}
