name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── Stage 1: Validate (runs on every push and PR) ──
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        run: cd infrastructure/terraform && terraform init -backend=false && terraform validate

      - name: Validate K8s Manifests
        run: |
          pip install pyyaml
          find infrastructure/k8s -name "*.yaml" -type f | while read f; do
            echo "Checking $f"
            python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))"
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-

      - name: Frontend - Lint
        run: cd frontend && npm install && npx eslint app components src

  # ── Stage 2: Build verify (PR only — no push to ECR) ──
  build-verify:
    name: Build Verify (PR)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Images (no push)
        env:
          PROJECT_NAME: multi-tenant-saas
        run: |
          SERVICES=(
            "auth-service:auth:auth/Dockerfile"
            "auth-gateway:auth-gateway:auth-gateway/Dockerfile"
            "orchestrator-service:.:agents/orchestrator/Dockerfile"
            "worker-agent1:.:agents/worker_agent1/Dockerfile"
            "frontend:frontend:frontend/Dockerfile"
            "task-status-service:task-status:task-status/Dockerfile"
            "chat-service:.:chat-service/Dockerfile"
            "rag-service:.:rag/Dockerfile"
          )
          for service in "${SERVICES[@]}"; do
            IFS=':' read -r REPO_NAME CONTEXT DOCKERFILE <<< "$service"
            echo "==> Building ${PROJECT_NAME}-${REPO_NAME}..."
            docker build -t ${PROJECT_NAME}-${REPO_NAME}:pr -f ./$DOCKERFILE ./$CONTEXT
          done

  # ── Stage 3: Deploy (push to dev only) ──
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [validate, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::385143640249:role/github-cts
          aws-region: us-east-1

      - name: Test identity
        run: aws sts get-caller-identity

      - name: Set up SSH Key for EC2 Deployment
        run: |
          echo "${{ secrets.AWS_EC2_SSH_KEY }}" > infrastructure/multi-tenant-saas-key.pem
          chmod 600 infrastructure/multi-tenant-saas-key.pem

      - name: Terraform Init & Apply
        run: |
          cd infrastructure/terraform
          terraform init
          terraform apply -auto-approve

      - name: Build, Push, and Deploy
        run: make redeploy-ecr
