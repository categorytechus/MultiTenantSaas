# Dev stack: same services as docker-compose.yml except frontend (run UI with: cd frontend && npm run dev).
# Node services use Dockerfile.dev + bind mounts; Python services use the repo Dockerfiles (no hot-reload by default).

name: multitenantsaas-dev

services:
  # pgvector image: migration 001 enables the `vector` extension (not in stock postgres:alpine).
  postgres:
    image: pgvector/pgvector:pg15
    container_name: multitenant-postgres
    environment:
      POSTGRES_DB: multitenant_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/migrations:/migrations:ro
      - ./infrastructure/docker/postgres/zz-apply-migrations.sh:/docker-entrypoint-initdb.d/zz-apply-migrations.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: multitenant-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 30s

  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile.dev
    container_name: multitenant-auth
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      - JWT_KEY=kjsandasbndk324jnksdjcnjdnakldnjdkjsandasbndk324jnksdjcnjdnakldnjd
      - GOOGLE_CLIENT_ID=mock
      - GOOGLE_CLIENT_SECRET=mock
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./auth/src:/app/src
      - ./auth/tsconfig.json:/app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 20s

  auth-gateway:
    build:
      context: ./auth-gateway
      dockerfile: Dockerfile.dev
    container_name: multitenant-auth-gateway
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      - JWT_KEY=kjsandasbndk324jnksdjcnjdnakldnjdkjsandasbndk324jnksdjcnjdnakldnjd
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./auth-gateway/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  rag-service:
    build:
      context: .
      dockerfile: rag/Dockerfile
    container_name: multitenant-rag
    ports:
      - "8003:8000"
      - "50051:50051"
    environment:
      - OPENAI_API_KEY=dev-placeholder
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      - S3_VECTOR_BUCKET=dev-local-bucket
      - AWS_ACCESS_KEY_ID=mock
      - AWS_SECRET_ACCESS_KEY=mock
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      postgres:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: multitenant-chat
    ports:
      - "8004:3002"
      - "50052:50052"
    environment:
      - OPENAI_API_KEY=dev-placeholder
      - AWS_ACCESS_KEY_ID=mock
      - AWS_SECRET_ACCESS_KEY=mock
      - AWS_DEFAULT_REGION=us-east-1
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      - RAG_SERVICE_ADDR=rag-service:50051
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rag-service:
        condition: service_started

  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    container_name: multitenant-orchestrator
    environment:
      - OPENAI_API_KEY=dev-placeholder
      - AWS_ACCESS_KEY_ID=mock
      - AWS_SECRET_ACCESS_KEY=mock
      - AWS_DEFAULT_REGION=us-east-1
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - CHAT_SERVICE_ADDR=chat-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chat-service:
        condition: service_started

  worker-agent1:
    build:
      context: .
      dockerfile: agents/worker_agent1/Dockerfile
    container_name: multitenant-worker-1
    environment:
      - OPENAI_API_KEY=dev-placeholder
      - AWS_ACCESS_KEY_ID=mock
      - AWS_SECRET_ACCESS_KEY=mock
      - AWS_DEFAULT_REGION=us-east-1
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=multitenant_saas
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - CHAT_SERVICE_ADDR=chat-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  task-status:
    build:
      context: ./task-status
      dockerfile: Dockerfile.dev
    container_name: multitenant-task-status
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - JWT_KEY=kjsandasbndk324jnksdjcnjdnakldnjdkjsandasbndk324jnksdjcnjdnakldnjd
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./task-status/index.js:/app/index.js
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  default:
    name: multitenant-network
