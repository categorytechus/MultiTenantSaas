services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multitenant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: src/server
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/multitenant
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      BEDROCK_MODEL_ARN: ${BEDROCK_MODEL_ARN:-}
      BEDROCK_MODEL_PROVIDER: ${BEDROCK_MODEL_PROVIDER:-anthropic}
      AWS_BEDROCK_REGION: ${AWS_BEDROCK_REGION:-us-east-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      ENVIRONMENT: production
      LOCAL_UPLOAD_DIR: /tmp/uploads
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  agents:
    build:
      context: src/agents
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/multitenant
      REDIS_URL: redis://redis:6379
      SERVER_URL: http://server:8000
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      BEDROCK_MODEL_ARN: ${BEDROCK_MODEL_ARN:-}
      BEDROCK_MODEL_PROVIDER: ${BEDROCK_MODEL_PROVIDER:-anthropic}
      AWS_BEDROCK_REGION: ${AWS_BEDROCK_REGION:-us-east-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-gemini}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      ENVIRONMENT: production
      LOCAL_UPLOAD_DIR: /tmp/uploads
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      server:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_BACKEND_ORIGIN: http://server:8000
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
