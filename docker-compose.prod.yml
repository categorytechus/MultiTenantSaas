services:
  server:
    image: ${ECR_REGISTRY}/multitenant-saas-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      BEDROCK_MODEL_ARN: ${BEDROCK_MODEL_ARN:-}
      BEDROCK_MODEL_PROVIDER: ${BEDROCK_MODEL_PROVIDER:-anthropic}
      AWS_BEDROCK_REGION: ${AWS_BEDROCK_REGION:-us-east-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-common}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  agents:
    image: ${ECR_REGISTRY}/multitenant-saas-agents:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SERVER_URL: http://server:8000
      SECRET_KEY: ${SECRET_KEY}
      BEDROCK_MODEL_ARN: ${BEDROCK_MODEL_ARN:-}
      BEDROCK_MODEL_PROVIDER: ${BEDROCK_MODEL_PROVIDER:-anthropic}
      AWS_BEDROCK_REGION: ${AWS_BEDROCK_REGION:-us-east-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      ENVIRONMENT: production
    depends_on:
      server:
        condition: service_healthy

  frontend:
    image: ${ECR_REGISTRY}/multitenant-saas-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      API_BACKEND_ORIGIN: http://server:8000
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
