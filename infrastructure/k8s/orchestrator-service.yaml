---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-service
  namespace: data
  labels:
    app: orchestrator-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator-service
  template:
    metadata:
      labels:
        app: orchestrator-service
    spec:
      containers:
        - name: orchestrator-service
          image: __ECR_ORCHESTRATOR_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: RABBITMQ_URL
              value: "amqp://admin:admin@rabbitmq.data.svc.cluster.local:5672"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: data
spec:
  selector:
    app: orchestrator-service
  ports:
    - name: http
      port: 3000
      targetPort: 3000
