---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-gateway
  namespace: data
  labels:
    app: auth-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-gateway
  template:
    metadata:
      labels:
        app: auth-gateway
    spec:
      containers:
        - name: auth-gateway
          image: __ECR_GATEWAY_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: RABBITMQ_URL
              value: "amqp://admin:admin@rabbitmq.data.svc.cluster.local:5672"
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@postgresql.data.svc.cluster.local:5432/multitenant_saas"
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-gateway
  namespace: data
spec:
  selector:
    app: auth-gateway
  ports:
    - name: http
      port: 3001
      targetPort: 3001
