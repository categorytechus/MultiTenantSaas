---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: data
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: __ECR_AUTH_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY
            - name: DB_HOST
              value: "pgbouncer.data.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_NAME
              value: "multitenant_saas"
            - name: GOOGLE_CLIENT_ID
              value: "placeholder"
            - name: GOOGLE_CLIENT_SECRET
              value: "placeholder"
            - name: GOOGLE_CALLBACK_URL
              value: "http://localhost/api/auth/google/callback"
            - name: CLIENT_URL
              value: "http://localhost"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: data
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 4000
      targetPort: 4000
