---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: data
  labels:
    app: rag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
        - name: rag-service
          image: __ECR_RAG_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
            - containerPort: 50051
          env:
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: AWS_REGION
              value: "us-east-1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: OPENAI_API_KEY
                  optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: data
spec:
  selector:
    app: rag-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 50051
      targetPort: 50051
